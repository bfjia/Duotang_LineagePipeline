name: Docker workflow test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  docker-test:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Reference outputs present
        run: |
          test -f test/output/latest_lineage_assignments.csv
          test -f test/output/latest_virusseq_metadata.tsv
          test -f test/test.fasta
          test -f test/metadata.csv

      - name: Build image
        run: docker build -t duotang-lineage:test .

      - name: Run pangolin workflow (test inputs)
        run: |
          rm -rf output
          mkdir -p output
          docker run --rm \
            -v "$GITHUB_WORKSPACE/output:/output" \
            -v "$GITHUB_WORKSPACE/test/test.fasta:/data/test.fasta:ro" \
            -v "$GITHUB_WORKSPACE/test/metadata.csv:/data/metadata.csv:ro" \
            duotang-lineage:test \
            -i /data/test.fasta \
            -m /data/metadata.csv \
            -t 1 \
            -o /output

      # LLM Magic. Don't want to deal with comparing symlinks on GitHub Actions. Reviewed and safe to use.
      # run_pangolin_workflow.sh symlinks latest_* to readlink -f paths under /output/...;
      # those absolute paths do not exist on the host, so latest_* are broken here — diff the run_* files.
      - name: Compare run outputs to test/output references
        run: |
          set -euo pipefail
          run_dir="$(find output -maxdepth 1 -type d -name 'run_*' | sort | tail -n1)"
          test -n "${run_dir}"
          lineage="${run_dir}/lineage_assignments.csv"
          enriched="${run_dir}/virusseq.metadata.enriched.tsv"
          test -f "${lineage}" && test -s "${lineage}"
          test -f "${enriched}" && test -s "${enriched}"
          echo "=== diff lineage (test/output/latest_lineage_assignments.csv vs ${lineage}) ==="
          if ! diff -u test/output/latest_lineage_assignments.csv "${lineage}"; then
            echo >&2
            echo >&2 "Lineage CSV mismatch. If pangolin output changed intentionally, refresh test/output from run dir:"
            echo >&2 "  run_dir=\$(find output -maxdepth 1 -type d -name 'run_*' | sort | tail -n1)"
            echo >&2 "  cp \"\$run_dir/lineage_assignments.csv\" test/output/latest_lineage_assignments.csv"
            echo >&2 "  cp \"\$run_dir/virusseq.metadata.enriched.tsv\" test/output/latest_virusseq_metadata.tsv"
            exit 1
          fi
          echo "=== diff enriched metadata (test/output/latest_virusseq_metadata.tsv vs ${enriched}) ==="
          if ! diff -u test/output/latest_virusseq_metadata.tsv "${enriched}"; then
            echo >&2
            echo >&2 "Enriched metadata mismatch. Regenerate as above (both cp lines)."
            exit 1
          fi
          echo "OK: output matches test/output references."
